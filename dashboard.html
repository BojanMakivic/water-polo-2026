<!DOCTYPE html>
<html lang="en">
<head>

            color: #1f2937;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px 16px 40px;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 1.8rem;
        }

        p {
            margin: 0 0 16px;
            line-height: 1.5;
        }

        .frame-wrapper {
            background: #fff;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);

        iframe {
            display: block;

        }
